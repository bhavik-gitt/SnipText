<svg width="1240" height="460" viewBox="0 0 1240 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ===================== LIGHT MODE PANEL ===================== -->
  <g>
    <rect x="0" y="0" width="600" height="460" rx="18" fill="#f4f6fa"/>
    <rect x="16" y="16" width="568" height="428" rx="14" fill="#ffffff" filter="url(#cardShadow)"/>

    <!-- Navbar -->
    <rect x="16" y="16" width="568" height="52" rx="14" fill="#0d6efd"/>
    <rect x="16" y="50" width="568" height="18" fill="#0d6efd"/>
    <text x="40" y="48" fill="#ffffff" font-size="20" font-weight="700">✂️ SnipText</text>
    <text x="200" y="48" fill="#e7f0ff" font-size="14">Home</text>
    <text x="255" y="48" fill="#e7f0ff" font-size="14">About</text>
    <g>
      <rect x="470" y="34" width="34" height="18" rx="9" fill="#ffffff" opacity="0.85"/>
      <circle cx="480" cy="43" r="7" fill="#0d6efd"/>
      <text x="512" y="48" fill="#ffffff" font-size="12">Dark Mode</text>
    </g>

    <!-- Alert -->
    <rect x="40" y="82" width="524" height="26" rx="6" fill="#d1e7dd"/>
    <text x="52" y="99" fill="#0f5132" font-size="12">✔ Extra spaces removed</text>

    <!-- Heading -->
    <text x="40" y="138" fill="#1c1c1c" font-size="19" font-weight="700">SnipText — Word &amp; Character Counter</text>

    <!-- Textarea -->
    <rect x="40" y="152" width="524" height="90" rx="6" fill="#ffffff" stroke="#ced4da" stroke-width="1.5"/>
    <text x="52" y="174" fill="#495057" font-size="13">The quick brown fox jumps   over the lazy dog.</text>
    <text x="52" y="194" fill="#495057" font-size="13">SnipText cleans up   messy   text in one click.</text>
    <rect x="52" y="204" width="7" height="14" fill="#0d6efd">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- Buttons row -->
    <g font-size="11.5" fill="#ffffff">
      <rect x="40" y="254" width="78" height="28" rx="6" fill="#0d6efd"/>
      <text x="52" y="272">Uppercase</text>

      <rect x="126" y="254" width="78" height="28" rx="6" fill="#0d6efd"/>
      <text x="138" y="272">Lowercase</text>

      <rect x="212" y="254" width="56" height="28" rx="6" fill="#0d6efd"/>
      <text x="224" y="272">Copy</text>

      <rect x="276" y="254" width="140" height="28" rx="6" fill="#0d6efd"/>
      <text x="288" y="272">Remove Extra Spaces</text>

      <rect x="424" y="254" width="56" height="28" rx="6" fill="#0d6efd"/>
      <text x="436" y="272">Clear</text>

      <rect x="40" y="290" width="110" height="28" rx="6" fill="#0d6efd"/>
      <text x="52" y="308">Download .txt</text>
    </g>

    <!-- Summary -->
    <text x="40" y="346" fill="#1c1c1c" font-size="15" font-weight="700">Your Text Summary</text>
    <text x="40" y="366" fill="#343a40" font-size="12.5">14 words, 78 characters</text>
    <text x="40" y="384" fill="#343a40" font-size="12.5">0.11 Minutes to Read</text>
    <text x="40" y="404" fill="#1c1c1c" font-size="14" font-weight="700">Preview</text>
    <text x="40" y="422" fill="#495057" font-size="12">The quick brown fox jumps over the lazy dog...</text>

    <text x="300" y="452" text-anchor="middle" fill="#6c757d" font-size="12" font-weight="600">LIGHT MODE</text>
  </g>

  <!-- ===================== DARK MODE PANEL ===================== -->
  <g transform="translate(640,0)">
    <rect x="0" y="0" width="600" height="460" rx="18" fill="#1b1b1b"/>
    <rect x="16" y="16" width="568" height="428" rx="14" fill="#2c2c2c" filter="url(#cardShadow)"/>

    <!-- Navbar -->
    <rect x="16" y="16" width="568" height="52" rx="14" fill="#111111"/>
    <rect x="16" y="50" width="568" height="18" fill="#111111"/>
    <text x="40" y="48" fill="#ffffff" font-size="20" font-weight="700">✂️ SnipText</text>
    <text x="200" y="48" fill="#cfcfcf" font-size="14">Home</text>
    <text x="255" y="48" fill="#cfcfcf" font-size="14">About</text>
    <g>
      <rect x="470" y="34" width="34" height="18" rx="9" fill="#0d6efd" opacity="0.9"/>
      <circle cx="496" cy="43" r="7" fill="#ffffff"/>
      <text x="512" y="48" fill="#ffffff" font-size="12">Light Mode</text>
    </g>

    <!-- Alert -->
    <rect x="40" y="82" width="524" height="26" rx="6" fill="#0f5132"/>
    <text x="52" y="99" fill="#d1e7dd" font-size="12">✔ Dark mode has been enabled</text>

    <!-- Heading -->
    <text x="40" y="138" fill="#ffffff" font-size="19" font-weight="700">SnipText — Word &amp; Character Counter</text>

    <!-- Textarea -->
    <rect x="40" y="152" width="524" height="90" rx="6" fill="#3c3c3c" stroke="#555555" stroke-width="1.5"/>
    <text x="52" y="174" fill="#e9ecef" font-size="13">The quick brown fox jumps   over the lazy dog.</text>
    <text x="52" y="194" fill="#e9ecef" font-size="13">SnipText cleans up   messy   text in one click.</text>
    <rect x="52" y="204" width="7" height="14" fill="#66b2ff">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- Buttons row -->
    <g font-size="11.5" fill="#ffffff">
      <rect x="40" y="254" width="78" height="28" rx="6" fill="#3d8bfd"/>
      <text x="52" y="272">Uppercase</text>

      <rect x="126" y="254" width="78" height="28" rx="6" fill="#3d8bfd"/>
      <text x="138" y="272">Lowercase</text>

      <rect x="212" y="254" width="56" height="28" rx="6" fill="#3d8bfd"/>
      <text x="224" y="272">Copy</text>

      <rect x="276" y="254" width="140" height="28" rx="6" fill="#3d8bfd"/>
      <text x="288" y="272">Remove Extra Spaces</text>

      <rect x="424" y="254" width="56" height="28" rx="6" fill="#3d8bfd"/>
      <text x="436" y="272">Clear</text>

      <rect x="40" y="290" width="110" height="28" rx="6" fill="#3d8bfd"/>
      <text x="52" y="308">Download .txt</text>
    </g>

    <!-- Summary -->
    <text x="40" y="346" fill="#ffffff" font-size="15" font-weight="700">Your Text Summary</text>
    <text x="40" y="366" fill="#dee2e6" font-size="12.5">14 words, 78 characters</text>
    <text x="40" y="384" fill="#dee2e6" font-size="12.5">0.11 Minutes to Read</text>
    <text x="40" y="404" fill="#ffffff" font-size="14" font-weight="700">Preview</text>
    <text x="40" y="422" fill="#ced4da" font-size="12">The quick brown fox jumps over the lazy dog...</text>

    <text x="300" y="452" text-anchor="middle" fill="#9a9a9a" font-size="12" font-weight="600">DARK MODE</text>
  </g>
</svg>
